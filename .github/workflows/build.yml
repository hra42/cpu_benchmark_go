name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - name: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
          - name: linux-riscv64
            runner: ubuntu-latest
            goos: linux
            goarch: riscv64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          check-latest: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          out="dist/cpu_bench_go-${{ matrix.name }}"
          go build -trimpath -ldflags="-s -w" -o "$out" .

      - uses: actions/upload-artifact@v4
        with:
          name: cpu_bench_go-${{ matrix.name }}
          path: dist/cpu_bench_go-${{ matrix.name }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: cp scripts/install.sh dist/install.sh

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
